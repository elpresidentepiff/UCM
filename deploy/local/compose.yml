name: ucm-local

services:
  workforce:
    build:
      context: ../../app/employee
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - private

  gateway:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    depends_on:
      workforce:
        condition: service_healthy
    ports:
      - "127.0.0.1:${UCM_LOCAL_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - private

networks:
  private:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
